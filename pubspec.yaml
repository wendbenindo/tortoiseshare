name: tortoiseshare
description: "Partage de fichiers et écran entre mobile et desktop"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.4  # Pour sélectionner des fichiers
  path_provider: ^2.1.5  # Pour accéder aux répertoires système
  shared_preferences: ^2.2.2  # Pour sauvegarder les préférences
  screenshot: ^2.1.0  # Pour capturer l'écran
  image: ^4.0.17  # Pour compression JPEG optimisée
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

  generate: true

# Configuration des icônes de l'application
flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icons/logo.jpg"
    icon_size: 48
  image_path: "assets/icons/logo.jpg"
  # Désactiver les icônes adaptatives pour éviter le découpage
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo.jpg"
  remove_alpha_ios: true
  min_sdk_android: 21